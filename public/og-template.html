<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1200px;
      height: 630px;
      background: #FAF6F4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }
    
    .container {
      text-align: center;
      padding: 80px;
    }
    
    .loader {
      margin: 0 auto 50px;
      width: 200px;
      height: 80px;
      border: 4px solid #2C1810;
      border-radius: 8px;
      position: relative;
      padding: 8px;
    }
    
    .loader::after {
      content: '';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 30px;
      background: #2C1810;
      border-radius: 0 4px 4px 0;
    }
    
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, #C9A961, #C8727D);
      border-radius: 4px;
      animation: charging 3s ease-in-out infinite;
    }
    
    @keyframes charging {
      0% { width: 20%; }
      50% { width: 100%; }
      100% { width: 20%; }
    }
    
    .sitename {
      font-size: 72px;
      font-weight: 500;
      color: #2C1810;
      margin-bottom: 30px;
      letter-spacing: 0.05em;
    }
    
    .tagline {
      font-size: 24px;
      color: #C9A961;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader">
      <div class="loader-fill"></div>
    </div>
    <div class="sitename">/sarahcodeswell</div>
    <div class="tagline">building things with intention</div>
  </div>
</body>
</html>
