<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1200px;
      height: 630px;
      background: #FAF6F4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }
    
    .container {
      text-align: center;
      padding: 80px;
    }
    
    .greeting {
      font-size: 120px;
      font-weight: 500;
      color: #2C1810;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
      background: linear-gradient(120deg, #F5F0E5 0%, #F5F0E5 100%);
      background-size: 100% 40%;
      background-repeat: no-repeat;
      background-position: 0 85%;
      padding: 0 20px;
      display: inline-block;
    }
    
    .tagline {
      font-size: 28px;
      color: #5A4A3F;
      font-weight: 300;
      letter-spacing: 0.02em;
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.6;
    }
    
    .accent {
      color: #C9A961;
      font-weight: 400;
    }
    
    .footer {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 20px;
      color: #A89B8F;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="greeting">Hi, I'm Sarah.</div>
    <div class="tagline">
      anthropologist by trade, technologist by obsession<br>
      <span class="accent">building things with intention</span>
    </div>
  </div>
  <div class="footer">sarahcodeswell.com</div>
</body>
</html>
